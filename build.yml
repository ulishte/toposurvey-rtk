name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o TopoSurvey.zip -d project

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate Gradle 8.7 wrapper in isolation
        run: |
          mkdir -p /tmp/wrap
          cd /tmp/wrap
          gradle wrapper --gradle-version 8.7
          cp gradlew "$GITHUB_WORKSPACE/project/TopoSurvey/"
          cp -r gradle "$GITHUB_WORKSPACE/project/TopoSurvey/"

      - name: Build debug APK
        working-directory: project/TopoSurvey
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TopoSurvey-debug-apk
          path: project/TopoSurvey/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
